services:
  postgres:
    image: postgres:16
    container_name: Veltrix_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: db
      POSTGRES_PASSWORD: db
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veltrix

  php:
    image: ghcr.io/local-deploy/php8.2-fpm:1.0.3
    container_name: Veltrix_php
    restart: unless-stopped
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9000"
    networks:
      - veltrix

  nginx:
    image: nginx:alpine
    container_name: Veltrix_nginx
    restart: unless-stopped
    environment:
      DOCUMENT_ROOT: /var/www/html/backend/public
    volumes:
      - ./backend:/var/www/html/backend:ro
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - php
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - veltrix

  frontend:
    image: node:20-alpine
    container_name: frontend
    restart: unless-stopped
    working_dir: /var/www/html/frontend
    command: sh -c "rm -rf .next && npm install && npm run dev"
    volumes:
      - ./frontend:/var/www/html/frontend
      - frontend_node_modules:/var/www/html/frontend/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: /api
      INTERNAL_API_BASE_URL: http://nginx/api
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
      NEXT_TELEMETRY_DISABLED: 1
      TURBOPACK_WATCHING: true
    expose:
      - "3000"
    networks:
      - veltrix

  mail:
    image: mailhog/mailhog
    container_name: mail
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - veltrix

networks:
  veltrix:
    name: veltrix

volumes:
  pgsql_data:
    name: Veltrix_pgsql_data
  frontend_node_modules:
    name: Veltrix_frontend_node_modules
