services:
  frontend:
    image: node:20-alpine
    container_name: diplom_frontend
    working_dir: /var/www/html/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/var/www/html/frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: /api